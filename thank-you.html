<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grazie | SpotMe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: #080b12;
      color: #e5e7eb;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
    }
    .box {
      width: min(620px, 95%);
      border: 1px solid #243046;
      background: #111827;
      border-radius: 14px;
      padding: 1.2rem;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 1.7rem;
    }
    p {
      color: #cdd4de;
    }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      color: #38bdf8;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="box">
    <h1>Grazie per esserti unito a SpotMe!</h1>
    <p>Abbiamo ricevuto la tua email e ti contatteremo appena l'accesso anticipato sara disponibile.</p>
    <a href="/">Torna alla homepage</a>
  </main>
</body>
</html>
